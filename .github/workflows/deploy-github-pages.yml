name: Deploy to GitHub Pages

# 触发条件 - main分支推送时自动构建和部署
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 权限配置
permissions:
  contents: write       # 读取和写入仓库内容（需要推送到publish分支）
  pull-requests: write  # PR评论
  statuses: write       # 更新commit状态
  pages: write          # 推送到publish分支

# 环境变量
env:
  HUGO_VERSION: '0.152.2'
  HUGO_EXTENDED: true
  NODE_VERSION: '18'

# 任务定义
jobs:
  # 构建任务
  build:
    name: Build and Deploy GitHub Pages
    runs-on: ubuntu-latest

    steps:
      # 步骤1: 检出代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false         # 不使用Git Submodule，改用Hugo Modules
          fetch-depth: 0            # 获取全部历史 (用于GitInfo)

      # 步骤2: 设置Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: ${{ env.HUGO_EXTENDED }}

      # 步骤2.5: 安装Hugo Modules依赖 ⭐ 关键变更
      - name: Install Hugo Modules
        run: |
          echo "🔄 初始化Hugo Modules..."
          # 启用Go模块
          export GO111MODULE=on
          # 使用hugo自动管理模块
          hugo mod tidy
          echo "✅ 模块配置完成"

      # 步骤3: 设置Node.js (用于Stack主题SCSS编译)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # 注意: 不使用cache，因为主题没有package-lock.json

      # 步骤3.5: 验证Hugo Modules
      - name: Verify Hugo Modules
        run: |
          echo "🔍 验证Hugo Modules配置..."
          cat go.mod
          echo ""
          echo "🔍 检查模块缓存..."
          hugo mod graph
          echo ""
          echo "🔍 验证主题存在..."
          ls -la $(go env GOPATH)/pkg/mod/github.com/CaiJimmy/ 2>/dev/null || echo "模块缓存位置未知"

      # 步骤3.6: 复制Stack主题assets ⭐ 关键步骤
      - name: Copy Stack Theme Assets
        run: |
          echo "📁 复制Stack主题资源文件..."
          # 查找Go模块缓存
          MODULE_CACHE=$(go env GOPATH)/pkg/mod/github.com/CaiJimmy/hugo-theme-stack/v3*
          if [ -d "$MODULE_CACHE" ]; then
            echo "✅ 找到主题: $MODULE_CACHE"
            mkdir -p assets
            cp -r $MODULE_CACHE/assets/* assets/ 2>/dev/null || echo "⚠️  资源复制失败"
            echo "✅ 资源复制完成"
            echo "SCSS文件数: $(find assets -name "*.scss" 2>/dev/null | wc -l)"
            echo "TypeScript文件数: $(find assets -name "*.ts" 2>/dev/null | wc -l)"
            echo "SVG图标文件数: $(find assets/icons -name "*.svg" 2>/dev/null | wc -l)"
          else
            echo "⚠️ 未找到主题assets目录，查找确切位置..."
            find $(go env GOPATH)/pkg/mod -name "hugo-theme-stack*" -type d 2>/dev/null | head -5
            echo "列出所有Go模块缓存..."
            ls -la $(go env GOPATH)/pkg/mod/github.com/CaiJimmy/ 2>/dev/null | head -10 || echo "无此目录"
          fi

      # 步骤4: 验证构建环境
      - name: Verify Build Environment
        run: |
          echo "🔍 环境验证..."
          echo "Hugo版本: $(hugo version)"
          echo "Node版本: $(node --version)"
          echo "npm版本: $(npm --version)"
          echo "内容目录: $(ls -la content/ | head -5)"
          echo "assets目录: $(ls -la assets/ 2>/dev/null || echo '无assets目录')"
          echo "SCSS资源: $(find assets/ -name "*.scss" 2>/dev/null | wc -l) 个文件"
          echo "TypeScript资源: $(find assets/ -name "*.ts" 2>/dev/null | wc -l) 个文件"
          echo "SVG图标资源: $(find assets/icons -name "*.svg" 2>/dev/null | wc -l) 个文件"

      # 步骤5: 执行Hugo构建
      - name: Build Hugo Site
        run: |
          echo "🔨 开始构建Hugo站点..."
          hugo --gc --minify
          echo "✅ 构建完成"

      # 步骤7: 验证构建产物
      - name: Verify Build Output
        run: |
          echo "🔍 验证构建产物..."
          if [ -d "public" ]; then
            echo "✅ public目录存在"
            echo "文件数量: $(find public -type f | wc -l)"
            echo "目录大小: $(du -sh public | cut -f1)"
            echo "首页检查: $(test -f public/index.html && echo '存在' || echo '缺失')"
            echo "Sitemap检查: $(test -f public/sitemap.xml && echo '存在' || echo '缺失')"
            echo "RSS检查: $(test -f public/index.xml && echo '存在' || echo '缺失')"
          else
            echo "❌ public目录不存在!"
            exit 1
          fi

      # 步骤8: 部署到GitHub Pages (gh-pages分支) ⭐
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          cname: blog.victor42.work
          force_orphan: true      # 每次部署只保留最新快照，不累积发布历史

      # 步骤9: 添加PR评论 (仅PR时)
      - name: Comment PR with Build Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            const publishUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/tree/gh-pages`;
            const buildStatus = '${{ job.status }}';
            const commentBody = `📦 Hugo构建${buildStatus === 'success' ? '成功' : '失败'}!

            - **构建状态**: ${buildStatus.toUpperCase()}
            - **Commit**: ${context.sha.substring(0, 7)}
            - **构建者**: ${context.actor}
            - **时间**: ${new Date().toISOString()}
            - **gh-pages分支**: [查看代码](${publishUrl})

            > 4EVERLAND等部署平台可直接部署gh-pages分支的静态文件
            `;

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('Hugo构建')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            }

      # 步骤10: 更新Commit状态 (仅push到main时)
      - name: Update Commit Status
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ job.status }}';
            const state = buildStatus === 'success' ? 'success' : 'failure';
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: state,
              description: `Hugo构建${buildStatus === 'success' ? '成功，publish分支已更新' : '失败'}`,
              context: 'Hugo Build',
              target_url: repoUrl
            });
